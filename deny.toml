# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Project is Apache-2.0; allow common permissive licenses for dependencies.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates are referenced by path without a version, which
# cargo-deny treats as a wildcard. Allow those; still deny real wildcard deps.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
