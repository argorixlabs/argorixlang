name: Bug report
description: Report a defect in ArgorixLang
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including expected vs. actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal `.argx` snippet or commands to reproduce.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "v0.25.0 or git SHA"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Linux, macOS, Windows]
    validations:
      required: true
