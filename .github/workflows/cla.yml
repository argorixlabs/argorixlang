name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write # signatures file is stored in this repo
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Signatures are stored in this repo; no separate repo/PAT needed.
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/argorixlabs/argorixlang/blob/main/CLA.md"
          branch: "main"
          # Project owners and bots are exempt from signing their own contributions.
          allowlist: argorixlabs,dependabot[bot],bot*
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✍️"
